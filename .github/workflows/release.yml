name: Release

on:
  push:
    tags: ["v*"]
  # Manual trigger for re-publishing an existing tag (e.g. after fixing the
  # workflow itself). Pass the tag name in `ref` when dispatching.
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out=trilium-mcp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          go build -ldflags="-s -w" -o "$out" .
          shasum -a 256 "$out" > "$out.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            trilium-mcp-*

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Strip leading v from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ovden13/trilium-mcp:${{ steps.ver.outputs.version }}
            ghcr.io/ovden13/trilium-mcp:latest
          labels: |
            io.modelcontextprotocol.server.name=io.github.OVDEN13/trilium-mcp
            org.opencontainers.image.source=https://github.com/OVDEN13/trilium-mcp
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

  publish-registry:
    # Publish server.json to the MCP Registry using GitHub OIDC — no PAT or
    # interactive `mcp-publisher login github` needed. The Registry exchanges
    # the workflow's id-token for a short-lived publish token automatically.
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          ./mcp-publisher --help >/dev/null
      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json to MCP Registry
        run: ./mcp-publisher publish
